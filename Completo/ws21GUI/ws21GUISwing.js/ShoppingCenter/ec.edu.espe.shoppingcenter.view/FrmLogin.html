<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="form-group">
            <label>Usuario:</label>
            <input type="text" id="txtUsuario">
        </div>
        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" id="psdPassword">
        </div>
        <button id="btmAccept">Ingresar</button>
    </div>

    <script src="../ec.edu.espe.shoppingcenter.model/User.js"></script>
    <script src="../ec.edu.espe.shoppingcenter.controller/UserController.js"></script>
    <script>
        document.getElementById("btmAccept").addEventListener("click", () => {
            const userNameInput = document.getElementById("txtUsuario").value;
            const passwordInput = document.getElementById("psdPassword").value;
            const userController = new UserController();

            if (userController.login(userNameInput, passwordInput)) {
                window.location.href = "FrmMenu.html";
            } else {
                alert("Invalid username or password");
            }
        });
    </script>
</body>
</html>
