<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 20px; display: flex; justify-content: center; }
        .window-frame { background: #ededed; border: 1px solid #ababab; border-radius: 4px; width: 450px; box-shadow: 2px 2px 10px rgba(0,0,0,0.15); font-size: 13px; }
        .window-title { background: linear-gradient(to bottom, #7da2ce, #4a77a9); color: white; padding: 5px 10px; font-weight: bold; border-top-left-radius: 3px; border-top-right-radius: 3px; }
        .window-content { padding: 15px; }
        h2 { text-align: center; margin: 0 0 15px 0; font-size: 18px; color: #333; }
        .form-grid { display: grid; grid-template-columns: 120px 1fr; row-gap: 10px; align-items: center; }
        label { font-weight: normal; color: #000; }
        input[type="text"], select { width: 100%; padding: 3px; box-sizing: border-box; background-color: white; border: 1px solid #7a7a7a; }
        .age-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; }
        select[multiple] { height: 90px; }
        .button-panel { display: flex; justify-content: center; gap: 10px; margin-top: 20px; padding-top: 10px; border-top: 1px solid #d0d0d0; }
        button { padding: 4px 14px; min-width: 70px; background: #e1e1e1; border: 1px solid #707070; border-radius: 3px; cursor: pointer; }
        button:hover { background: #cfe1f3; border-color: #3c7fb1; }
    </style>
</head>
<body>

    <div class="window-frame">
        <div class="window-title">Customers</div>
        <div class="window-content">
            <h2>Customers</h2>
            <form onsubmit="return false;">
                <div class="form-grid">
                    <label for="txtId">id:</label>
                    <input type="text" id="txtId">

                    <label for="txtFirstName">First Name:</label>
                    <input type="text" id="txtFirstName">

                    <label for="txtLastName">Last Name:</label>
                    <input type="text" id="txtLastName">

                    <label for="cmbGender">Gender:</label>
                    <select id="cmbGender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>

                    <label for="txtMoneySpent">Money Spent:</label>
                    <input type="text" id="txtMoneySpent">

                    <label for="sldAge">Age:</label>
                    <div class="age-container">
                        <input type="range" id="sldAge" min="0" max="100" value="0" oninput="lblAge.innerText = this.value">
                        <span id="lblAge">0</span>
                    </div>

                    <label for="cmbTypeOfCustomer">Type of Customer:</label>
                    <select id="cmbTypeOfCustomer">
                        <option value="Frequent">Frequent</option>
                        <option value="Casual">Casual</option>
                        <option value="VIP">VIP</option>
                    </select>

                    <label for="lstHobbies">Hobbies:</label>
                    <select id="lstHobbies" multiple>
                        <option value="Play Music">Play Music</option>
                        <option value="Listening to Music">Listening to Music</option>
                        <option value="Play Soccer">Play Soccer</option>
                        <option value="Play an Instrument">Play an Instrument</option>
                        <option value="Paint">Paint</option>
                        <option value="Study English">Study English</option>
                    </select>
                </div>

                <div class="button-panel">
                    <button type="button" id="btnInsert">Insert</button>
                    <button type="button" id="btnCancel">Cancel</button>
                    <button type="button" id="btnQuit">Quit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../ec.edu.espe.shoppingcenter.model/Customer.js"></script>
    <script src="../main.js"></script>
</body>
</html>
