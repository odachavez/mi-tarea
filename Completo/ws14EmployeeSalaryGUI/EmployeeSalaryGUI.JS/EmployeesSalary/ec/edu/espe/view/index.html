<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
        .total-box { margin-top: 15px; padding: 10px; background: #e2e3e5; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Payroll & Registration</h2>
    
    <form id="employeeForm">
        <div class="form-group">
            <label for="empId">Employee ID (Alphanumeric):</label>
            <input type="text" id="empId" required pattern="[A-Za-z0-9]+" title="Only letters and numbers allowed">
        </div>
        <div class="form-group">
            <label for="empName">Full Name (Letters only):</label>
            <input type="text" id="empName" required pattern="[A-Za-z\s]+" title="Only letters and spaces allowed">
        </div>
        <div class="form-group">
            <label for="clockIn">Clock-In Time:</label>
            <input type="time" id="clockIn" required>
        </div>
        <div class="form-group">
            <label for="clockOut">Clock-Out Time:</label>
            <input type="time" id="clockOut" required>
        </div>
        <div class="form-group">
            <label for="role">Role / Position:</label>
            <input type="text" id="role" required pattern="[A-Za-z\s]+" title="Only letters and spaces allowed">
        </div>
        <div class="form-group">
            <label for="salary">Salary ($):</label>
            <input type="number" id="salary" min="0" step="0.01" required title="Must be a positive number">
        </div>
        <button type="submit">Register Employee</button>
    </form>

    <h3>Employee Payroll List</h3>
    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Clock-In</th>
                <th>Clock-Out</th>
                <th>Role</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="total-box">
        TOTAL BUDGET REQUIRED: $<span id="totalSalary">0.00</span>
    </div>
</div>

<script src="appRenderer.js"></script>

<script>
    document.getElementById('employeeForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página se recargue al enviar

        
        const id = document.getElementById('empId').value;
        const name = document.getElementById('empName').value;
        const clockIn = document.getElementById('clockIn').value;
        const clockOut = document.getElementById('clockOut').value;
        const role = document.getElementById('role').value;
        const salary = parseFloat(document.getElementById('salary').value);

        
        const table = document.querySelector('table');
        
        
        const newRow = table.insertRow(-1); 
        newRow.innerHTML = `
            <td>${id}</td>
            <td>${name}</td>
            <td>${clockIn}</td>
            <td>${clockOut}</td>
            <td>${role}</td>
            <td>$${salary.toFixed(2)}</td>
        `;

        
        let totalBudget = 0;
        
        for (let i = 1; i < table.rows.length; i++) {
           
            let salaryText = table.rows[i].cells[5].innerText.replace('$', '');
            totalBudget += parseFloat(salaryText);
        }

        
        const totalBox = document.querySelector('.total-box');
        if (totalBox) {
            totalBox.innerText = `TOTAL BUDGET REQUIRED: $${totalBudget.toFixed(2)}`;
        }

        
        document.getElementById('employeeForm').reset();
    });
</script>
</body>
</html>
