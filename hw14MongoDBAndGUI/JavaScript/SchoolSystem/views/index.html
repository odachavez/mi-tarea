<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>School System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>School System</h1>

    <fieldset>

        <legend>Student Management</legend>

        <div class="form-container">

            <div class="fields">

                <label>Id</label>
                <input type="text" id="studentId">

                <label>First Name</label>
                <input type="text" id="firstName">

                <label>Last Name</label>
                <input type="text" id="lastName">

                <label>Age</label>
                <input type="number" id="age">

            </div>

            <div class="buttons">

                <button id="saveStudentButton">Save</button>
                <button id="searchStudentButton">Search</button>
                <button id="updateStudentButton">Update</button>
                <button id="deleteStudentButton">Delete</button>

            </div>

        </div>

    </fieldset>

    <fieldset>

        <legend>Teacher Management</legend>

        <div class="form-container">

            <div class="fields">

                <label>Id</label>
                <input type="text" id="teacherId">

                <label>Name</label>
                <input type="text" id="teacherName">

                <label>Subject</label>
                <input type="text" id="subject">

            </div>

            <div class="buttons">

                <button id="saveTeacherButton">Save</button>
                <button id="searchTeacherButton">Search</button>
                <button id="updateTeacherButton">Update</button>
                <button id="deleteTeacherButton">Delete</button>

            </div>

        </div>

    </fieldset>

    <fieldset>

        <legend>Course Management</legend>

        <div class="form-container">

            <div class="fields">

                <label>Id</label>
                <input type="text" id="courseId">

                <label>Name</label>
                <input type="text" id="courseName">

                <label>Teacher</label>
                <input type="text" id="courseTeacher">

            </div>

            <div class="buttons">

                <button id="saveCourseButton">Save</button>
                <button id="searchCourseButton">Search</button>
                <button id="updateCourseButton">Update</button>
                <button id="deleteCourseButton">Delete</button>

            </div>

        </div>

    </fieldset>

    <script src="app.js"></script>

</body>

</html>
